<script>
  var l = globalThis.location;
  var base = "/interview-prep-hub";
  var rest = l.pathname.slice(base.length) || "/";
  l.replace(
    l.protocol +
      "//" +
      l.hostname +
      (l.port ? ":" + l.port : "") +
      base +
      "/?p=" +
      encodeURIComponent(rest) +
      (l.search ? "&q=" + encodeURIComponent(l.search.slice(1)) : "") +
      l.hash,
  );
</script>
